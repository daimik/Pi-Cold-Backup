; PlatformIO Configuration — Cold Backup ESP32 Controller
; Board: WT32-ETH01 (ESP32 + LAN8720 Ethernet)

[env:wt32-eth01]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200

; Custom partition table: 1.75MB app + 512KB LittleFS
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs

lib_deps =
    mathieucarbou/ESP Async WebServer @ ^3.0.6
    mathieucarbou/AsyncTCP @ >=3.3.0
    bblanchon/ArduinoJson @ ^7

; Suppress the old Async TCP 3.1.4 (pulled by ESP Async WebServer) which
; crashes on ESP-IDF 5.x due to missing TCPIP core locking.
; AsyncTCP 3.3+ above is the fixed replacement.
lib_ignore = Async TCP

upload_speed = 921600
