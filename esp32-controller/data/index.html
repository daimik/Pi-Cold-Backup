<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Backup Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cold Backup Controller</h1>
        <div>
            <span id="conn-status" class="badge off">--</span>
            <span id="eth-status" class="badge off">--</span>
        </div>
    </header>

    <main>
        <!-- Status Card -->
        <section class="card">
            <h2>Status</h2>
            <div class="status-grid">
                <div class="stat">
                    <label>Pi Power</label>
                    <span id="pi-power" class="dot off"></span>
                </div>
                <div class="stat">
                    <label>State</label>
                    <span id="state">--</span>
                </div>
                <div class="stat">
                    <label>Last Backup</label>
                    <span id="last-backup">--</span>
                </div>
                <div class="stat">
                    <label>Last Result</label>
                    <span id="last-result">--</span>
                </div>
                <div class="stat">
                    <label>Duration</label>
                    <span id="last-duration">--</span>
                </div>
                <div class="stat">
                    <label>Last Error</label>
                    <span id="last-error">--</span>
                </div>
                <div class="stat">
                    <label>Next Run</label>
                    <span id="next-run">--</span>
                </div>
                <div class="stat">
                    <label>ESP32 Uptime</label>
                    <span id="uptime">--</span>
                </div>
                <div class="stat">
                    <label>Free Heap</label>
                    <span id="heap">--</span>
                </div>
            </div>
        </section>

        <!-- Controls -->
        <section class="card">
            <h2>Controls</h2>
            <div class="btn-row">
                <button onclick="powerOn()" class="btn green">Power On</button>
                <button onclick="powerOff()" class="btn red">Power Off</button>
                <button onclick="triggerBackup()" class="btn blue">Run Backup</button>
                <button onclick="rebootEsp()" class="btn">Reboot ESP</button>
            </div>
        </section>

        <!-- Configuration -->
        <section class="card">
            <h2>Configuration</h2>
            <form id="config-form" onsubmit="saveConfig(event)">
                <div class="form-row">
                    <label for="relay_pin">Relay GPIO Pin</label>
                    <input type="number" id="relay_pin" min="0" max="39">
                </div>
                <div class="form-row">
                    <label for="pi_ip">Pi IP Address</label>
                    <input type="text" id="pi_ip" placeholder="192.168.1.11">
                </div>
                <div class="form-row">
                    <label for="pi_port">Pi API Port</label>
                    <input type="number" id="pi_port" min="1" max="65535">
                </div>
                <div class="form-row">
                    <label for="schedule_interval_min">Schedule Interval (minutes)</label>
                    <input type="number" id="schedule_interval_min" min="1">
                </div>
                <button type="submit" class="btn">Save</button>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
